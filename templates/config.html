<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konfiguracja – PEKA Board</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="config-body">

<div class="config-wrap">
  <div class="config-header">
    <span class="cfg-logo">■ PEKA Board</span>
    <span class="cfg-title">Konfiguracja przystanków</span>
    <a href="/" class="btn-back">← Tablica</a>
  </div>

  <div class="config-main">

    <!-- Lewa: wyszukiwanie -->
    <div class="cfg-left">
      <div class="cfg-section-title">1. Wyszukaj przystanek</div>
      <div class="cfg-search-row">
        <input type="text" id="inp-search" placeholder="Wpisz nazwę przystanku…"
               oninput="onSearchType()" autocomplete="off">
        <span id="search-spinner" class="spinner hidden">⏳</span>
      </div>

      <div class="cfg-section-title" style="margin-top:10px">Przystanki:</div>
      <div class="cfg-list-wrap">
        <ul id="list-stops" class="cfg-list"></ul>
      </div>

      <div class="cfg-section-title" style="margin-top:10px">2. Wybierz słupek:</div>
      <div class="cfg-list-wrap cfg-bollard-wrap">
        <div id="list-bollards"></div>
      </div>

      <button onclick="addBollard()" class="btn-add">➕ Dodaj do tablicy</button>
    </div>

    <!-- Środek -->
    <div class="cfg-arrow">→</div>

    <!-- Prawa: wybrane bollardy -->
    <div class="cfg-right">
      <div class="cfg-section-title">
        3. Tablica
        <span id="cfg-count" class="cfg-count">0 / 6 słupków · 0 / 16 wierszy</span>
      </div>

      <div class="cfg-selected-wrap" id="list-selected"></div>

      <div class="cfg-move-row">
        <button onclick="moveUp()" class="btn-move">⬆ Wyżej</button>
        <button onclick="moveDown()" class="btn-move">⬇ Niżej</button>
      </div>
      <button onclick="removeSelected()" class="btn-remove">🗑 Usuń zaznaczony</button>
    </div>

  </div>

  <div class="cfg-footer">
    <button onclick="saveConfig()" class="btn-save">✔ Zapisz i wróć do tablicy</button>
    <span id="cfg-msg" class="cfg-msg"></span>
  </div>
</div>

<script>
const MAX_BOLLARDS = 6;
const MAX_ROWS     = 16;

let searchResults  = [];
let bollardResults = [];
let selectedBollards = {{ current_config | safe }};
let searchJob      = null;
let selectedBollard = null;
let selectedIdx    = -1;

// Zapewnij że każdy bollard ma rows
selectedBollards = selectedBollards.map(b => ({ ...b, rows: b.rows || 2 }));

renderSelected();

// ── Wyszukiwanie ──────────────────────────────────────────────────────────────
function onSearchType() {
  clearTimeout(searchJob);
  searchJob = setTimeout(doSearch, 400);
}

async function doSearch() {
  const q = document.getElementById("inp-search").value.trim();
  if (q.length < 2) {
    document.getElementById("list-stops").innerHTML = "";
    return;
  }
  document.getElementById("search-spinner").classList.remove("hidden");
  try {
    const r = await fetch(`/api/stops/search?q=${encodeURIComponent(q)}`);
    searchResults = await r.json();
    renderStops(searchResults);
  } finally {
    document.getElementById("search-spinner").classList.add("hidden");
  }
}

function renderStops(stops) {
  const ul = document.getElementById("list-stops");
  ul.innerHTML = "";
  if (!stops.length) { ul.innerHTML = "<li class='cfg-empty'>—</li>"; return; }
  stops.forEach((s, i) => {
    const li = document.createElement("li");
    li.textContent = s.name;
    li.onclick = () => { highlightList("list-stops", i); onStopClick(i); };
    ul.appendChild(li);
  });
}

async function onStopClick(idx) {
  selectedBollard = null;
  document.getElementById("list-bollards").innerHTML = "";
  document.getElementById("search-spinner").classList.remove("hidden");
  try {
    const r = await fetch(`/api/stops/bollards?stop_name=${encodeURIComponent(searchResults[idx].name)}`);
    bollardResults = await r.json();
    renderBollards(bollardResults);
  } finally {
    document.getElementById("search-spinner").classList.add("hidden");
  }
}

function renderBollards(bollards) {
  const wrap = document.getElementById("list-bollards");
  wrap.innerHTML = "";
  if (!bollards.length) {
    wrap.innerHTML = "<div class='cfg-empty'>—</div>"; return;
  }

  bollards.forEach((b, i) => {
    const div = document.createElement("div");
    div.className = "boll-card";

    // Linie z kierunkami
    const lwd = b.lines_with_dirs || b.lines.map(l => ({ line: l, directions: [] }));
    const linesHtml = lwd.map(ld => {
      const dirs = ld.directions && ld.directions.length
        ? `<span class="boll-line-dirs">${ld.directions.join(", ")}</span>`
        : "";
      return `<div class="boll-line-row">
        <span class="boll-line-badge">${ld.line}</span>${dirs}
      </div>`;
    }).join("");

    div.innerHTML = `
      <div class="boll-card-header">
        <span class="boll-card-symbol">${b.symbol}</span>
      </div>
      <div class="boll-card-lines">${linesHtml}</div>`;

    div.onclick = () => {
      selectedBollard = bollards[i];
      document.querySelectorAll(".boll-card").forEach(c => c.classList.remove("active"));
      div.classList.add("active");
    };
    wrap.appendChild(div);
  });
}

// ── Zarządzanie listą ─────────────────────────────────────────────────────────
function addBollard() {
  if (!selectedBollard) { showMsg("Zaznacz słupek z listy."); return; }
  if (selectedBollards.length >= MAX_BOLLARDS) {
    showMsg(`Maksymalnie ${MAX_BOLLARDS} słupków.`); return;
  }
  if (selectedBollards.some(b => b.symbol === selectedBollard.symbol)) {
    showMsg("Ten słupek jest już na liście."); return;
  }
  const totalRows = selectedBollards.reduce((s, b) => s + (b.rows || 2), 0);
  const newRows = Math.min(2, MAX_ROWS - totalRows);
  if (newRows < 1) { showMsg("Osiągnięto limit 16 wierszy."); return; }
  selectedBollards.push({ ...selectedBollard, rows: newRows });
  renderSelected();
}

function removeSelected() {
  if (selectedIdx < 0) return;
  selectedBollards.splice(selectedIdx, 1);
  selectedIdx = -1;
  renderSelected();
}

function moveUp() {
  if (selectedIdx <= 0) return;
  [selectedBollards[selectedIdx-1], selectedBollards[selectedIdx]] =
  [selectedBollards[selectedIdx], selectedBollards[selectedIdx-1]];
  selectedIdx--;
  renderSelected();
  highlightSelected(selectedIdx);
}

function moveDown() {
  if (selectedIdx < 0 || selectedIdx >= selectedBollards.length-1) return;
  [selectedBollards[selectedIdx], selectedBollards[selectedIdx+1]] =
  [selectedBollards[selectedIdx+1], selectedBollards[selectedIdx]];
  selectedIdx++;
  renderSelected();
  highlightSelected(selectedIdx);
}

function changeRows(idx, delta) {
  const totalRows = selectedBollards.reduce((s, b) => s + (b.rows || 2), 0);
  const cur = selectedBollards[idx].rows || 2;
  const newVal = cur + delta;
  if (newVal < 1 || newVal > 5) return;
  if (delta > 0 && totalRows >= MAX_ROWS) {
    showMsg("Osiągnięto limit 16 wierszy."); return;
  }
  selectedBollards[idx].rows = newVal;
  renderSelected();
  highlightSelected(idx);
}

function renderSelected() {
  const wrap = document.getElementById("list-selected");
  wrap.innerHTML = "";
  const totalRows = selectedBollards.reduce((s, b) => s + (b.rows || 2), 0);

  selectedBollards.forEach((b, i) => {
    const card = document.createElement("div");
    card.className = "sel-card" + (i === selectedIdx ? " active" : "");
    card.onclick = () => { selectedIdx = i; highlightSelected(i); };

    card.innerHTML = `
      <div class="sel-card-main">
        <span class="sel-card-num">${i+1}.</span>
        <span class="sel-card-label">${b.label}</span>
        <span class="sel-card-symbol">${b.symbol}</span>
      </div>
      <div class="sel-card-rows">
        <button class="btn-rows" onclick="event.stopPropagation();changeRows(${i},-1)">−</button>
        <span class="rows-val">${b.rows || 2} ${(b.rows||2)===1?'wiersz':((b.rows||2)<5?'wiersze':'wierszy')}</span>
        <button class="btn-rows" onclick="event.stopPropagation();changeRows(${i},+1)">+</button>
      </div>`;

    wrap.appendChild(card);
  });

  // Licznik
  const cnt = document.getElementById("cfg-count");
  const rowsColor = totalRows >= MAX_ROWS ? "#e74c3c" : "#f5a623";
  const bollColor = selectedBollards.length >= MAX_BOLLARDS ? "#e74c3c" : "#f5a623";
  cnt.innerHTML = `<span style="color:${bollColor}">${selectedBollards.length}/${MAX_BOLLARDS} słupków</span>
    · <span style="color:${rowsColor}">${totalRows}/${MAX_ROWS} wierszy</span>`;
}

function highlightSelected(idx) {
  document.querySelectorAll(".sel-card").forEach((c, i) => {
    c.classList.toggle("active", i === idx);
  });
}

// ── Zapis ─────────────────────────────────────────────────────────────────────
async function saveConfig() {
  if (!selectedBollards.length) { showMsg("Dodaj co najmniej jeden słupek."); return; }
  const r = await fetch("/api/config", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(selectedBollards),
  });
  if (r.ok) window.location.href = "/";
  else showMsg("Błąd zapisu.");
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function highlightList(id, idx) {
  document.querySelectorAll(`#${id} li`).forEach((li, i) =>
    li.classList.toggle("active", i === idx));
}

function showMsg(msg) {
  const el = document.getElementById("cfg-msg");
  el.textContent = msg;
  setTimeout(() => { el.textContent = ""; }, 3000);
}
</script>
</body>
</html>
